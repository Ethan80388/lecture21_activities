<!DOCTYPE html>
<html>
    <head>
        <title>Activity 1</title>
    </head>
    <body>
        <h1>Javascript Button</h1>
        <button onclick="myfunction(20)">Calulate</button>
        <script>
            function myfunction(x,y)
            {
              if(y=== undefined){
                y=2;
              }
              document.write(x**2*y**2)
            }
        </script>
    </body>
</html>
